<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 420">
  <defs>
    <filter id="phosphor">
      <feGaussianBlur stdDeviation="1" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="phosphor-strong">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <radialGradient id="vignette" cx="50%" cy="50%" r="70%">
      <stop offset="0%" style="stop-color:#0a1a0a; stop-opacity:0"/>
      <stop offset="100%" style="stop-color:#000000; stop-opacity:0.5"/>
    </radialGradient>
    <pattern id="scan" patternUnits="userSpaceOnUse" width="560" height="3">
      <rect width="560" height="1.5" fill="transparent"/>
      <rect y="1.5" width="560" height="1.5" fill="rgba(0,0,0,0.12)"/>
    </pattern>
  </defs>

  <style>
    text { font-family: 'Courier New', 'Consolas', monospace; }
    @keyframes flicker {
      0%, 100% { opacity: 0.97; }
      93% { opacity: 0.90; }
      94% { opacity: 0.97; }
    }
    @keyframes bar1 { 0% { width: 0; } 100% { width: 270px; } }
    @keyframes bar2 { 0% { width: 0; } 100% { width: 240px; } }
    @keyframes bar3 { 0% { width: 0; } 100% { width: 295px; } }
    @keyframes bar4 { 0% { width: 0; } 100% { width: 210px; } }
    @keyframes bar5 { 0% { width: 0; } 100% { width: 180px; } }
    @keyframes bar6 { 0% { width: 0; } 100% { width: 285px; } }
    @keyframes pip-walk {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-3px); }
    }
    @keyframes pip-arm {
      0%, 100% { transform: rotate(0deg); }
      25% { transform: rotate(8deg); }
      75% { transform: rotate(-5deg); }
    }
    .screen { animation: flicker 5s infinite; }
    .b1 { animation: bar1 1.2s ease-out forwards; }
    .b2 { animation: bar2 1.2s ease-out 0.15s forwards; width: 0; }
    .b3 { animation: bar3 1.2s ease-out 0.3s forwards; width: 0; }
    .b4 { animation: bar4 1.2s ease-out 0.45s forwards; width: 0; }
    .b5 { animation: bar5 1.2s ease-out 0.6s forwards; width: 0; }
    .b6 { animation: bar6 1.2s ease-out 0.75s forwards; width: 0; }
    .vault-boy { animation: pip-walk 2s ease-in-out infinite; }
  </style>

  <!-- Casing -->
  <rect width="560" height="420" rx="12" fill="#1a1a0e"/>
  <rect x="3" y="3" width="554" height="414" rx="10" fill="#0d0d06" stroke="#2a2a1a" stroke-width="2"/>
  <circle cx="14" cy="14" r="3" fill="none" stroke="#3a3a2a" stroke-width="1"/>
  <circle cx="546" cy="14" r="3" fill="none" stroke="#3a3a2a" stroke-width="1"/>
  <circle cx="14" cy="406" r="3" fill="none" stroke="#3a3a2a" stroke-width="1"/>
  <circle cx="546" cy="406" r="3" fill="none" stroke="#3a3a2a" stroke-width="1"/>

  <!-- Screen -->
  <rect x="8" y="8" width="544" height="404" rx="8" fill="#0a1a0a"/>

  <g class="screen">
    <!-- Header -->
    <text x="280" y="35" text-anchor="middle" font-size="16" fill="#00ff41" filter="url(#phosphor-strong)" letter-spacing="4">S.P.E.C.I.A.L.</text>
    <line x1="30" y1="45" x2="530" y2="45" stroke="#00ff41" stroke-width="0.5" opacity="0.3"/>

    <!-- Vault Boy thumbs up - simple pixel style -->
    <g class="vault-boy" transform="translate(460, 55)">
      <!-- Head -->
      <circle cx="30" cy="12" r="11" fill="none" stroke="#00ff41" stroke-width="1.5" opacity="0.5"/>
      <!-- Hair -->
      <path d="M20,8 Q22,0 30,2 Q38,0 40,8" fill="none" stroke="#00ff41" stroke-width="1.2" opacity="0.5"/>
      <!-- Eyes (wink) -->
      <circle cx="26" cy="11" r="1.5" fill="#00ff41" opacity="0.5"/>
      <line x1="33" y1="10" x2="37" y2="12" stroke="#00ff41" stroke-width="1" opacity="0.5"/>
      <!-- Smile -->
      <path d="M24,17 Q30,22 36,17" fill="none" stroke="#00ff41" stroke-width="1" opacity="0.5"/>
      <!-- Body -->
      <line x1="30" y1="23" x2="30" y2="42" stroke="#00ff41" stroke-width="1.5" opacity="0.4"/>
      <!-- Thumbs up arm -->
      <g style="transform-origin: 30px 28px;" class="vault-boy">
        <line x1="30" y1="28" x2="48" y2="22" stroke="#00ff41" stroke-width="1.5" opacity="0.4"/>
        <circle cx="49" cy="19" r="3" fill="none" stroke="#00ff41" stroke-width="1.2" opacity="0.4"/>
        <line x1="49" y1="16" x2="49" y2="12" stroke="#00ff41" stroke-width="1.5" opacity="0.4"/>
      </g>
      <!-- Other arm -->
      <line x1="30" y1="28" x2="15" y2="38" stroke="#00ff41" stroke-width="1.2" opacity="0.3"/>
      <!-- Legs -->
      <line x1="30" y1="42" x2="22" y2="58" stroke="#00ff41" stroke-width="1.2" opacity="0.3"/>
      <line x1="30" y1="42" x2="38" y2="58" stroke="#00ff41" stroke-width="1.2" opacity="0.3"/>
    </g>

    <!-- STAT BARS -->
    <!-- FINTECH -->
    <text x="30" y="75" font-size="12" fill="#00ff41" filter="url(#phosphor)" letter-spacing="1">FINTECH</text>
    <rect x="140" y="63" width="300" height="16" rx="2" fill="#0a1a0a" stroke="#00ff41" stroke-width="0.5" opacity="0.3"/>
    <rect x="141" y="64" height="14" rx="1" fill="#00ff41" opacity="0.6" filter="url(#phosphor)" class="b1"/>
    <text x="455" y="75" font-size="12" fill="#00ff41" filter="url(#phosphor)">9/10</text>

    <!-- AI/AGENTS -->
    <text x="30" y="115" font-size="12" fill="#00ff41" filter="url(#phosphor)" letter-spacing="1">AI/AGENTS</text>
    <rect x="140" y="103" width="300" height="16" rx="2" fill="#0a1a0a" stroke="#00ff41" stroke-width="0.5" opacity="0.3"/>
    <rect x="141" y="104" height="14" rx="1" fill="#00ff41" opacity="0.6" filter="url(#phosphor)" class="b2"/>
    <text x="455" y="115" font-size="12" fill="#00ff41" filter="url(#phosphor)">8/10</text>

    <!-- SYSTEMS -->
    <text x="30" y="155" font-size="12" fill="#00ff41" filter="url(#phosphor)" letter-spacing="1">SYSTEMS</text>
    <rect x="140" y="143" width="300" height="16" rx="2" fill="#0a1a0a" stroke="#00ff41" stroke-width="0.5" opacity="0.3"/>
    <rect x="141" y="144" height="14" rx="1" fill="#00ff41" opacity="0.6" filter="url(#phosphor)" class="b3"/>
    <text x="455" y="155" font-size="12" fill="#00ff41" filter="url(#phosphor)">10/10</text>

    <!-- BACKEND -->
    <text x="30" y="195" font-size="12" fill="#00ff41" filter="url(#phosphor)" letter-spacing="1">BACKEND</text>
    <rect x="140" y="183" width="300" height="16" rx="2" fill="#0a1a0a" stroke="#00ff41" stroke-width="0.5" opacity="0.3"/>
    <rect x="141" y="184" height="14" rx="1" fill="#00ff41" opacity="0.6" filter="url(#phosphor)" class="b4"/>
    <text x="455" y="195" font-size="12" fill="#00ff41" filter="url(#phosphor)">7/10</text>

    <!-- HARDWARE -->
    <text x="30" y="235" font-size="12" fill="#00ff41" filter="url(#phosphor)" letter-spacing="1">HARDWARE</text>
    <rect x="140" y="223" width="300" height="16" rx="2" fill="#0a1a0a" stroke="#00ff41" stroke-width="0.5" opacity="0.3"/>
    <rect x="141" y="224" height="14" rx="1" fill="#00ff41" opacity="0.6" filter="url(#phosphor)" class="b5"/>
    <text x="455" y="235" font-size="12" fill="#00ff41" filter="url(#phosphor)">6/10</text>

    <!-- CHARISMA -->
    <text x="30" y="275" font-size="12" fill="#00ff41" filter="url(#phosphor)" letter-spacing="1">CHARISMA</text>
    <rect x="140" y="263" width="300" height="16" rx="2" fill="#0a1a0a" stroke="#00ff41" stroke-width="0.5" opacity="0.3"/>
    <rect x="141" y="264" height="14" rx="1" fill="#00ff41" opacity="0.6" filter="url(#phosphor)" class="b6"/>
    <text x="455" y="275" font-size="12" fill="#00ff41" filter="url(#phosphor)">9/10</text>

    <!-- Separator -->
    <line x1="30" y1="295" x2="530" y2="295" stroke="#00ff41" stroke-width="0.5" opacity="0.2"/>

    <!-- Character info -->
    <text x="30" y="318" font-size="10" fill="#00ff41" opacity="0.4" letter-spacing="1">CLASS</text>
    <text x="90" y="318" font-size="11" fill="#00ff41" filter="url(#phosphor)" letter-spacing="1">SYSTEM ARCHITECT</text>

    <text x="320" y="318" font-size="10" fill="#00ff41" opacity="0.4" letter-spacing="1">LVL</text>
    <text x="355" y="318" font-size="14" fill="#00ff41" filter="url(#phosphor-strong)" font-weight="bold">42</text>

    <text x="400" y="318" font-size="10" fill="#00ff41" opacity="0.4" letter-spacing="1">XP</text>
    <text x="425" y="318" font-size="11" fill="#00ff41" filter="url(#phosphor)">13,370</text>

    <!-- Perks -->
    <line x1="30" y1="332" x2="530" y2="332" stroke="#00ff41" stroke-width="0.3" opacity="0.2"/>
    <text x="30" y="350" font-size="10" fill="#00ff41" opacity="0.4" letter-spacing="1">PERKS</text>
    <text x="90" y="350" font-size="10" fill="#00ff41" filter="url(#phosphor)" opacity="0.7">Kotlin</text>
    <text x="155" y="350" font-size="10" fill="#00ff41" filter="url(#phosphor)" opacity="0.7">TypeScript</text>
    <text x="245" y="350" font-size="10" fill="#00ff41" filter="url(#phosphor)" opacity="0.7">Python</text>
    <text x="310" y="350" font-size="10" fill="#00ff41" filter="url(#phosphor)" opacity="0.7">Ruby</text>
    <text x="360" y="350" font-size="10" fill="#00ff41" filter="url(#phosphor)" opacity="0.7">Rails</text>
    <text x="405" y="350" font-size="10" fill="#00ff41" filter="url(#phosphor)" opacity="0.7">POS</text>

    <!-- HP/AP bars at bottom -->
    <line x1="30" y1="368" x2="530" y2="368" stroke="#00ff41" stroke-width="0.3" opacity="0.2"/>
    <text x="30" y="385" font-size="10" fill="#00ff41" opacity="0.5" letter-spacing="1">HP</text>
    <rect x="55" y="375" width="200" height="12" rx="2" fill="#0a1a0a" stroke="#00ff41" stroke-width="0.5" opacity="0.3"/>
    <rect x="56" y="376" width="190" height="10" rx="1" fill="#00ff41" opacity="0.4"/>
    <text x="265" y="385" font-size="9" fill="#00ff41" opacity="0.4">95/100</text>

    <text x="320" y="385" font-size="10" fill="#00ff41" opacity="0.5" letter-spacing="1">AP</text>
    <rect x="345" y="375" width="140" height="12" rx="2" fill="#0a1a0a" stroke="#00ff41" stroke-width="0.5" opacity="0.3"/>
    <rect x="346" y="376" width="105" height="10" rx="1" fill="#00ff41" opacity="0.4"/>
    <text x="495" y="385" font-size="9" fill="#00ff41" opacity="0.4">75/100</text>

    <!-- Footer -->
    <text x="280" y="405" text-anchor="middle" font-size="8" fill="#00ff41" opacity="0.15" letter-spacing="2">VAULT-TEC INDUSTRIES // REUZ // 2026</text>

    <!-- Vignette + Scanlines -->
    <rect x="8" y="8" width="544" height="404" rx="8" fill="url(#vignette)"/>
    <rect x="8" y="8" width="544" height="404" rx="8" fill="url(#scan)"/>
  </g>
</svg>
