<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 238" width="100%">
  <defs>
    <filter id="nn-glow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <style>
      .sans { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; }
      .mono { font-family: 'Segoe UI Mono', 'Cascadia Code', 'Courier New', monospace; }
      @keyframes bar1 { 0% { width: 0; } 100% { width: 285px; } }
      @keyframes bar2 { 0% { width: 0; } 100% { width: 295px; } }
      @keyframes bar3 { 0% { width: 0; } 100% { width: 261px; } }
      @keyframes bar4 { 0% { width: 0; } 100% { width: 240px; } }
      @keyframes bar5 { 0% { width: 0; } 100% { width: 270px; } }
      @keyframes nn-out { 0%, 100% { opacity: 0.5; } 50% { opacity: 0.9; } }
      .b1 { animation: bar1 1.2s ease-out          forwards; }
      .b2 { animation: bar2 1.2s ease-out 0.15s    forwards; width: 0; }
      .b3 { animation: bar3 1.2s ease-out 0.30s    forwards; width: 0; }
      .b4 { animation: bar4 1.2s ease-out 0.45s    forwards; width: 0; }
      .b5 { animation: bar5 1.2s ease-out 0.60s    forwards; width: 0; }
      .o1 { animation: nn-out 2.2s ease-in-out          infinite; }
      .o2 { animation: nn-out 2.2s ease-in-out 1.1s     infinite; }
    </style>
  </defs>

  <!--
    Neural network synced with skills (5 inputs → 3 hidden → 2 outputs)
    Input node y positions align with bar label baselines:
      AI 95        y=30   opacity 0.85
      FULL STACK 98 y=64  opacity 0.90  (brightest)
      DEV 87       y=98   opacity 0.72
      FINTECH 80   y=132  opacity 0.62
      MECHATR. 90  y=166  opacity 0.78
  -->
  <g transform="translate(482, 0)">
    <!-- Input → Hidden -->
    <line x1="5" y1="26"  x2="27" y2="45"  stroke="#58a6ff" stroke-width="0.4" opacity="0.14"/>
    <line x1="5" y1="26"  x2="27" y2="94"  stroke="#58a6ff" stroke-width="0.4" opacity="0.07"/>
    <line x1="5" y1="26"  x2="27" y2="143" stroke="#58a6ff" stroke-width="0.4" opacity="0.04"/>
    <line x1="5" y1="60"  x2="27" y2="45"  stroke="#58a6ff" stroke-width="0.4" opacity="0.16"/>
    <line x1="5" y1="60"  x2="27" y2="94"  stroke="#58a6ff" stroke-width="0.4" opacity="0.12"/>
    <line x1="5" y1="60"  x2="27" y2="143" stroke="#58a6ff" stroke-width="0.4" opacity="0.05"/>
    <line x1="5" y1="94"  x2="27" y2="45"  stroke="#58a6ff" stroke-width="0.4" opacity="0.08"/>
    <line x1="5" y1="94"  x2="27" y2="94"  stroke="#58a6ff" stroke-width="0.4" opacity="0.15"/>
    <line x1="5" y1="94"  x2="27" y2="143" stroke="#58a6ff" stroke-width="0.4" opacity="0.08"/>
    <line x1="5" y1="128" x2="27" y2="45"  stroke="#58a6ff" stroke-width="0.4" opacity="0.04"/>
    <line x1="5" y1="128" x2="27" y2="94"  stroke="#58a6ff" stroke-width="0.4" opacity="0.10"/>
    <line x1="5" y1="128" x2="27" y2="143" stroke="#58a6ff" stroke-width="0.4" opacity="0.14"/>
    <line x1="5" y1="162" x2="27" y2="45"  stroke="#58a6ff" stroke-width="0.4" opacity="0.03"/>
    <line x1="5" y1="162" x2="27" y2="94"  stroke="#58a6ff" stroke-width="0.4" opacity="0.07"/>
    <line x1="5" y1="162" x2="27" y2="143" stroke="#58a6ff" stroke-width="0.4" opacity="0.16"/>
    <!-- Hidden → Output -->
    <line x1="31" y1="45"  x2="55" y2="65"  stroke="#58a6ff" stroke-width="0.5" opacity="0.22"/>
    <line x1="31" y1="45"  x2="55" y2="120" stroke="#58a6ff" stroke-width="0.5" opacity="0.09"/>
    <line x1="31" y1="94"  x2="55" y2="65"  stroke="#58a6ff" stroke-width="0.5" opacity="0.20"/>
    <line x1="31" y1="94"  x2="55" y2="120" stroke="#58a6ff" stroke-width="0.5" opacity="0.20"/>
    <line x1="31" y1="143" x2="55" y2="65"  stroke="#58a6ff" stroke-width="0.5" opacity="0.09"/>
    <line x1="31" y1="143" x2="55" y2="120" stroke="#58a6ff" stroke-width="0.5" opacity="0.22"/>
    <!-- Input nodes (size + opacity ∝ skill value) -->
    <circle cx="5" cy="26"  r="4.2" fill="none" stroke="#58a6ff" stroke-width="1"   opacity="0.85"/>
    <circle cx="5" cy="26"  r="1.5" fill="#58a6ff" opacity="0.70"/>
    <circle cx="5" cy="60"  r="4.5" fill="none" stroke="#58a6ff" stroke-width="1.2" opacity="0.90" filter="url(#nn-glow)"/>
    <circle cx="5" cy="60"  r="1.8" fill="#58a6ff" opacity="0.80"/>
    <circle cx="5" cy="94"  r="3.8" fill="none" stroke="#58a6ff" stroke-width="1"   opacity="0.72"/>
    <circle cx="5" cy="94"  r="1.3" fill="#58a6ff" opacity="0.58"/>
    <circle cx="5" cy="128" r="3.4" fill="none" stroke="#58a6ff" stroke-width="0.9" opacity="0.62"/>
    <circle cx="5" cy="128" r="1.1" fill="#58a6ff" opacity="0.48"/>
    <circle cx="5" cy="162" r="4.0" fill="none" stroke="#58a6ff" stroke-width="1"   opacity="0.78"/>
    <circle cx="5" cy="162" r="1.4" fill="#58a6ff" opacity="0.62"/>
    <!-- Hidden nodes -->
    <circle cx="29" cy="45"  r="3.5" fill="none" stroke="#58a6ff" stroke-width="0.8" opacity="0.28"/>
    <circle cx="29" cy="94"  r="3.5" fill="none" stroke="#58a6ff" stroke-width="0.8" opacity="0.28"/>
    <circle cx="29" cy="143" r="3.5" fill="none" stroke="#58a6ff" stroke-width="0.8" opacity="0.28"/>
    <!-- Output nodes (pulsing) -->
    <circle cx="55" cy="65"  r="5" fill="#58a6ff" opacity="0.15" class="o1"/>
    <circle cx="55" cy="65"  r="5" fill="none" stroke="#58a6ff" stroke-width="1.5" filter="url(#nn-glow)" class="o1"/>
    <circle cx="55" cy="120" r="5" fill="#58a6ff" opacity="0.15" class="o2"/>
    <circle cx="55" cy="120" r="5" fill="none" stroke="#58a6ff" stroke-width="1.5" filter="url(#nn-glow)" class="o2"/>
    <circle cx="55" cy="65"  r="2" fill="#58a6ff" opacity="0.9"/>
    <circle cx="55" cy="120" r="2" fill="#58a6ff" opacity="0.9"/>
  </g>

  <!-- Guide rails -->
  <line x1="140" y1="16" x2="140" y2="174" stroke="#30363d" stroke-width="0.5" opacity="0.6"/>
  <line x1="440" y1="16" x2="440" y2="174" stroke="#30363d" stroke-width="0.5" opacity="0.6"/>

  <!-- ── Skill bars ── -->

  <!-- AI  95 -->
  <text x="30"  y="30" class="sans" font-size="12" fill="#8b949e">AI</text>
  <rect x="141" y="20" width="300" height="12" rx="2" fill="#21262d"/>
  <rect x="141" y="20" height="12" rx="2" fill="#3fb950" class="b1"/>
  <text x="455" y="30" class="mono" font-size="11" fill="#e6edf3">95</text>

  <!-- FULL STACK  98 -->
  <text x="30"  y="64" class="sans" font-size="12" fill="#8b949e">FULL STACK</text>
  <rect x="141" y="54" width="300" height="12" rx="2" fill="#21262d"/>
  <rect x="141" y="54" height="12" rx="2" fill="#3fb950" class="b2"/>
  <text x="455" y="64" class="mono" font-size="11" fill="#e6edf3">98</text>

  <!-- DEV  87 -->
  <text x="30"  y="98" class="sans" font-size="12" fill="#8b949e">DEV</text>
  <rect x="141" y="88" width="300" height="12" rx="2" fill="#21262d"/>
  <rect x="141" y="88" height="12" rx="2" fill="#3fb950" class="b3"/>
  <text x="455" y="98" class="mono" font-size="11" fill="#e6edf3">87</text>

  <!-- FINTECH  80 -->
  <text x="30"  y="132" class="sans" font-size="12" fill="#8b949e">FINTECH</text>
  <rect x="141" y="122" width="300" height="12" rx="2" fill="#21262d"/>
  <rect x="141" y="122" height="12" rx="2" fill="#3fb950" class="b4"/>
  <text x="455" y="132" class="mono" font-size="11" fill="#e6edf3">80</text>

  <!-- MECHATRONICS  90 -->
  <text x="30"  y="166" class="sans" font-size="12" fill="#8b949e">MECHATRONICS</text>
  <rect x="141" y="156" width="300" height="12" rx="2" fill="#21262d"/>
  <rect x="141" y="156" height="12" rx="2" fill="#3fb950" class="b5"/>
  <text x="455" y="166" class="mono" font-size="11" fill="#e6edf3">90</text>

  <!-- Divider -->
  <line x1="30" y1="181" x2="530" y2="181" stroke="#21262d" stroke-width="1"/>

  <!-- Focus -->
  <text x="30"  y="198" class="sans" font-size="10" fill="#484f58">FOCUS</text>
  <text x="82"  y="198" class="sans" font-size="10" fill="#58a6ff">LLM Orchestration</text>
  <text x="234" y="198" class="sans" font-size="10" fill="#30363d">·</text>
  <text x="242" y="198" class="sans" font-size="10" fill="#58a6ff">Payment Systems</text>
  <text x="364" y="198" class="sans" font-size="10" fill="#30363d">·</text>
  <text x="372" y="198" class="sans" font-size="10" fill="#58a6ff">System Architecture</text>

  <!-- Tools -->
  <text x="30"  y="215" class="sans" font-size="10" fill="#484f58">TOOLS</text>
  <text x="82"  y="215" class="sans" font-size="10" fill="#8b949e">AI Agents</text>
  <text x="149" y="215" class="sans" font-size="10" fill="#30363d">·</text>
  <text x="157" y="215" class="sans" font-size="10" fill="#8b949e">RAG Pipelines</text>
  <text x="249" y="215" class="sans" font-size="10" fill="#30363d">·</text>
  <text x="257" y="215" class="sans" font-size="10" fill="#8b949e">Distributed Systems</text>

  <!-- Footer -->
  <line x1="30" y1="226" x2="530" y2="226" stroke="#21262d" stroke-width="1"/>
  <text x="280" y="235" class="sans" text-anchor="middle" font-size="9" fill="#30363d">REUZ · 2026</text>
</svg>
