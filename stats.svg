<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 320" width="100%">
  <defs>
    <filter id="phosphor">
      <feGaussianBlur stdDeviation="1" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="phosphor-strong">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <radialGradient id="vignette" cx="50%" cy="50%" r="70%">
      <stop offset="0%" style="stop-color:#0a1a0a; stop-opacity:0"/>
      <stop offset="100%" style="stop-color:#000000; stop-opacity:0.5"/>
    </radialGradient>
    <pattern id="scan" patternUnits="userSpaceOnUse" width="560" height="3">
      <rect width="560" height="1.5" fill="transparent"/>
      <rect y="1.5" width="560" height="1.5" fill="rgba(0,0,0,0.12)"/>
    </pattern>
  </defs>

  <style>
    text { font-family: 'Courier New', 'Consolas', monospace; }
    @keyframes flicker {
      0%, 100% { opacity: 0.97; }
      93% { opacity: 0.90; }
      94% { opacity: 0.97; }
    }
    @keyframes bar1 { 0% { width: 0; } 100% { width: 285px; } }
    @keyframes bar2 { 0% { width: 0; } 100% { width: 295px; } }
    @keyframes bar3 { 0% { width: 0; } 100% { width: 255px; } }
    @keyframes bar4 { 0% { width: 0; } 100% { width: 240px; } }
    @keyframes bar5 { 0% { width: 0; } 100% { width: 210px; } }
    @keyframes pip-walk {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-3px); }
    }
    .screen { animation: flicker 5s infinite; }
    .b1 { animation: bar1 1.2s ease-out forwards; }
    .b2 { animation: bar2 1.2s ease-out 0.15s forwards; width: 0; }
    .b3 { animation: bar3 1.2s ease-out 0.3s forwards; width: 0; }
    .b4 { animation: bar4 1.2s ease-out 0.45s forwards; width: 0; }
    .b5 { animation: bar5 1.2s ease-out 0.6s forwards; width: 0; }
    .vault-boy { animation: pip-walk 2s ease-in-out infinite; }
  </style>

  <rect width="560" height="320" rx="12" fill="#1a1a0e"/>
  <rect x="3" y="3" width="554" height="314" rx="10" fill="#0d0d06" stroke="#2a2a1a" stroke-width="2"/>
  <circle cx="14" cy="14" r="3" fill="none" stroke="#3a3a2a" stroke-width="1"/>
  <circle cx="546" cy="14" r="3" fill="none" stroke="#3a3a2a" stroke-width="1"/>

  <rect x="8" y="8" width="544" height="304" rx="8" fill="#0a1a0a"/>

  <g class="screen">
    <!-- Vault Boy -->
    <g class="vault-boy" transform="translate(465, 20)">
      <circle cx="30" cy="12" r="11" fill="none" stroke="#00ff41" stroke-width="1.5" opacity="0.4"/>
      <path d="M20,8 Q22,0 30,2 Q38,0 40,8" fill="none" stroke="#00ff41" stroke-width="1.2" opacity="0.4"/>
      <circle cx="26" cy="11" r="1.5" fill="#00ff41" opacity="0.4"/>
      <line x1="33" y1="10" x2="37" y2="12" stroke="#00ff41" stroke-width="1" opacity="0.4"/>
      <path d="M24,17 Q30,22 36,17" fill="none" stroke="#00ff41" stroke-width="1" opacity="0.4"/>
      <line x1="30" y1="23" x2="30" y2="42" stroke="#00ff41" stroke-width="1.5" opacity="0.3"/>
      <line x1="30" y1="28" x2="48" y2="22" stroke="#00ff41" stroke-width="1.5" opacity="0.3"/>
      <circle cx="49" cy="19" r="3" fill="none" stroke="#00ff41" stroke-width="1.2" opacity="0.3"/>
      <line x1="49" y1="16" x2="49" y2="12" stroke="#00ff41" stroke-width="1.5" opacity="0.3"/>
      <line x1="30" y1="28" x2="15" y2="38" stroke="#00ff41" stroke-width="1.2" opacity="0.25"/>
      <line x1="30" y1="42" x2="22" y2="58" stroke="#00ff41" stroke-width="1.2" opacity="0.25"/>
      <line x1="30" y1="42" x2="38" y2="58" stroke="#00ff41" stroke-width="1.2" opacity="0.25"/>
    </g>

    <text x="30" y="35" font-size="14" fill="#00ff41" filter="url(#phosphor-strong)" letter-spacing="3">S.P.E.C.I.A.L.</text>
    <line x1="30" y1="45" x2="440" y2="45" stroke="#00ff41" stroke-width="0.5" opacity="0.2"/>

    <!-- AI / ML -->
    <text x="30" y="75" font-size="12" fill="#00ff41" filter="url(#phosphor)" letter-spacing="1">AI / ML</text>
    <rect x="140" y="63" width="300" height="16" rx="2" fill="#0a1a0a" stroke="#00ff41" stroke-width="0.5" opacity="0.3"/>
    <rect x="141" y="64" height="14" rx="1" fill="#00ff41" opacity="0.6" filter="url(#phosphor)" class="b1"/>
    <text x="455" y="75" font-size="12" fill="#00ff41" filter="url(#phosphor)">95</text>

    <!-- DEVELOPMENT -->
    <text x="30" y="110" font-size="12" fill="#00ff41" filter="url(#phosphor)" letter-spacing="1">DEV</text>
    <rect x="140" y="98" width="300" height="16" rx="2" fill="#0a1a0a" stroke="#00ff41" stroke-width="0.5" opacity="0.3"/>
    <rect x="141" y="99" height="14" rx="1" fill="#00ff41" opacity="0.6" filter="url(#phosphor)" class="b2"/>
    <text x="455" y="110" font-size="12" fill="#00ff41" filter="url(#phosphor)">98</text>

    <!-- ARCHITECTURE -->
    <text x="30" y="145" font-size="12" fill="#00ff41" filter="url(#phosphor)" letter-spacing="1">ARCH</text>
    <rect x="140" y="133" width="300" height="16" rx="2" fill="#0a1a0a" stroke="#00ff41" stroke-width="0.5" opacity="0.3"/>
    <rect x="141" y="134" height="14" rx="1" fill="#00ff41" opacity="0.6" filter="url(#phosphor)" class="b3"/>
    <text x="455" y="145" font-size="12" fill="#00ff41" filter="url(#phosphor)">85</text>

    <!-- FINTECH -->
    <text x="30" y="180" font-size="12" fill="#00ff41" filter="url(#phosphor)" letter-spacing="1">FINTECH</text>
    <rect x="140" y="168" width="300" height="16" rx="2" fill="#0a1a0a" stroke="#00ff41" stroke-width="0.5" opacity="0.3"/>
    <rect x="141" y="169" height="14" rx="1" fill="#00ff41" opacity="0.6" filter="url(#phosphor)" class="b4"/>
    <text x="455" y="180" font-size="12" fill="#00ff41" filter="url(#phosphor)">80</text>

    <!-- HARDWARE -->
    <text x="30" y="215" font-size="12" fill="#00ff41" filter="url(#phosphor)" letter-spacing="1">HARDWARE</text>
    <rect x="140" y="203" width="300" height="16" rx="2" fill="#0a1a0a" stroke="#00ff41" stroke-width="0.5" opacity="0.3"/>
    <rect x="141" y="204" height="14" rx="1" fill="#00ff41" opacity="0.6" filter="url(#phosphor)" class="b5"/>
    <text x="455" y="215" font-size="12" fill="#00ff41" filter="url(#phosphor)">70</text>

    <line x1="30" y1="232" x2="530" y2="232" stroke="#00ff41" stroke-width="0.3" opacity="0.2"/>

    <!-- Focus areas -->
    <text x="30" y="253" font-size="10" fill="#00ff41" opacity="0.35" letter-spacing="1">FOCUS</text>
    <text x="90" y="253" font-size="10" fill="#00ff41" filter="url(#phosphor)" opacity="0.6">AI Agents</text>
    <text x="175" y="253" font-size="10" fill="#00ff41" filter="url(#phosphor)" opacity="0.6">LLM Orchestration</text>
    <text x="330" y="253" font-size="10" fill="#00ff41" filter="url(#phosphor)" opacity="0.6">Payment Systems</text>

    <text x="30" y="275" font-size="10" fill="#00ff41" opacity="0.35" letter-spacing="1">TOOLS</text>
    <text x="90" y="275" font-size="10" fill="#00ff41" filter="url(#phosphor)" opacity="0.6">Claude Code</text>
    <text x="195" y="275" font-size="10" fill="#00ff41" filter="url(#phosphor)" opacity="0.6">RAG Pipelines</text>
    <text x="315" y="275" font-size="10" fill="#00ff41" filter="url(#phosphor)" opacity="0.6">Distributed Systems</text>

    <!-- Footer -->
    <line x1="30" y1="288" x2="530" y2="288" stroke="#00ff41" stroke-width="0.3" opacity="0.15"/>
    <text x="280" y="305" text-anchor="middle" font-size="8" fill="#00ff41" opacity="0.12" letter-spacing="2">REUZ // 2026</text>

    <rect x="8" y="8" width="544" height="304" rx="8" fill="url(#vignette)"/>
    <rect x="8" y="8" width="544" height="304" rx="8" fill="url(#scan)"/>
  </g>
</svg>
