<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 238" width="100%">
  <defs>
    <filter id="phosphor">
      <feGaussianBlur stdDeviation="1" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="phosphor-strong">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <style>
    text { font-family: 'Courier New', 'Consolas', monospace; }
    @keyframes flicker {
      0%, 100% { opacity: 0.97; }
      93% { opacity: 0.88; }
      94% { opacity: 0.98; }
    }
    @keyframes bar1 { 0% { width: 0; } 100% { width: 285px; } }
    @keyframes bar2 { 0% { width: 0; } 100% { width: 295px; } }
    @keyframes bar3 { 0% { width: 0; } 100% { width: 261px; } }
    @keyframes bar4 { 0% { width: 0; } 100% { width: 240px; } }
    @keyframes bar5 { 0% { width: 0; } 100% { width: 270px; } }
    @keyframes nn-pulse1 { 0%, 100% { opacity: 0.6; } 50% { opacity: 1; } }
    @keyframes nn-pulse2 { 0%, 100% { opacity: 0.6; } 50% { opacity: 1; } }
    .screen { animation: flicker 5s infinite; }
    .b1 { animation: bar1 1.2s ease-out forwards; }
    .b2 { animation: bar2 1.2s ease-out 0.15s forwards; width: 0; }
    .b3 { animation: bar3 1.2s ease-out 0.30s forwards; width: 0; }
    .b4 { animation: bar4 1.2s ease-out 0.45s forwards; width: 0; }
    .b5 { animation: bar5 1.2s ease-out 0.60s forwards; width: 0; }
    .nn-o1 { animation: nn-pulse1 2s ease-in-out infinite; }
    .nn-o2 { animation: nn-pulse2 2s ease-in-out 1s infinite; }
  </style>

  <g class="screen">

    <!-- Neural Network (top right) -->
    <g transform="translate(484, 0)">
      <line x1="5" y1="20" x2="29" y2="8"  stroke="#00ff41" stroke-width="0.5" opacity="0.12"/>
      <line x1="5" y1="20" x2="29" y2="30" stroke="#00ff41" stroke-width="0.5" opacity="0.15"/>
      <line x1="5" y1="20" x2="29" y2="52" stroke="#00ff41" stroke-width="0.5" opacity="0.07"/>
      <line x1="5" y1="50" x2="29" y2="8"  stroke="#00ff41" stroke-width="0.5" opacity="0.07"/>
      <line x1="5" y1="50" x2="29" y2="30" stroke="#00ff41" stroke-width="0.5" opacity="0.12"/>
      <line x1="5" y1="50" x2="29" y2="52" stroke="#00ff41" stroke-width="0.5" opacity="0.15"/>
      <line x1="33" y1="8"  x2="57" y2="20" stroke="#00ff41" stroke-width="0.5" opacity="0.20"/>
      <line x1="33" y1="30" x2="57" y2="20" stroke="#00ff41" stroke-width="0.5" opacity="0.22"/>
      <line x1="33" y1="52" x2="57" y2="20" stroke="#00ff41" stroke-width="0.5" opacity="0.11"/>
      <line x1="33" y1="8"  x2="57" y2="50" stroke="#00ff41" stroke-width="0.5" opacity="0.11"/>
      <line x1="33" y1="30" x2="57" y2="50" stroke="#00ff41" stroke-width="0.5" opacity="0.20"/>
      <line x1="33" y1="52" x2="57" y2="50" stroke="#00ff41" stroke-width="0.5" opacity="0.22"/>
      <circle cx="5"  cy="20" r="4" fill="none" stroke="#00ff41" stroke-width="1"   opacity="0.4"/>
      <circle cx="5"  cy="50" r="4" fill="none" stroke="#00ff41" stroke-width="1"   opacity="0.4"/>
      <circle cx="31" cy="8"  r="4" fill="none" stroke="#00ff41" stroke-width="1"   opacity="0.27"/>
      <circle cx="31" cy="30" r="4" fill="none" stroke="#00ff41" stroke-width="1"   opacity="0.27"/>
      <circle cx="31" cy="52" r="4" fill="none" stroke="#00ff41" stroke-width="1"   opacity="0.27"/>
      <circle cx="57" cy="20" r="5" fill="none" stroke="#00ff41" stroke-width="1.5" filter="url(#phosphor)" class="nn-o1"/>
      <circle cx="57" cy="50" r="5" fill="none" stroke="#00ff41" stroke-width="1.5" filter="url(#phosphor)" class="nn-o2"/>
      <circle cx="57" cy="20" r="1.8" fill="#00ff41" opacity="0.85"/>
      <circle cx="57" cy="50" r="1.8" fill="#00ff41" opacity="0.85"/>
      <text x="31" y="68" text-anchor="middle" font-size="6" fill="#00ff41" opacity="0.18" letter-spacing="1">NEURAL</text>
    </g>

    <!-- Ghost guide lines (bar range) -->
    <line x1="140" y1="16" x2="140" y2="174" stroke="#00ff41" stroke-width="0.3" opacity="0.08"/>
    <line x1="440" y1="16" x2="440" y2="174" stroke="#00ff41" stroke-width="0.3" opacity="0.08"/>

    <!-- AI -->
    <text x="30" y="30" font-size="12" fill="#00ff41" filter="url(#phosphor)" letter-spacing="1">AI</text>
    <rect x="141" y="20" height="12" rx="1" fill="#00ff41" opacity="0.65" filter="url(#phosphor)" class="b1"/>
    <text x="455" y="30" font-size="12" fill="#00ff41" filter="url(#phosphor)">95</text>

    <!-- FULL STACK -->
    <text x="30" y="64" font-size="12" fill="#00ff41" filter="url(#phosphor)" letter-spacing="1">FULL STACK</text>
    <rect x="141" y="54" height="12" rx="1" fill="#00ff41" opacity="0.65" filter="url(#phosphor)" class="b2"/>
    <text x="455" y="64" font-size="12" fill="#00ff41" filter="url(#phosphor)">98</text>

    <!-- DEV -->
    <text x="30" y="98" font-size="12" fill="#00ff41" filter="url(#phosphor)" letter-spacing="1">DEV</text>
    <rect x="141" y="88" height="12" rx="1" fill="#00ff41" opacity="0.65" filter="url(#phosphor)" class="b3"/>
    <text x="455" y="98" font-size="12" fill="#00ff41" filter="url(#phosphor)">87</text>

    <!-- FINTECH -->
    <text x="30" y="132" font-size="12" fill="#00ff41" filter="url(#phosphor)" letter-spacing="1">FINTECH</text>
    <rect x="141" y="122" height="12" rx="1" fill="#00ff41" opacity="0.65" filter="url(#phosphor)" class="b4"/>
    <text x="455" y="132" font-size="12" fill="#00ff41" filter="url(#phosphor)">80</text>

    <!-- MECHATRONICS -->
    <text x="30" y="166" font-size="12" fill="#00ff41" filter="url(#phosphor)" letter-spacing="1">MECHATRONICS</text>
    <rect x="141" y="156" height="12" rx="1" fill="#00ff41" opacity="0.65" filter="url(#phosphor)" class="b5"/>
    <text x="455" y="166" font-size="12" fill="#00ff41" filter="url(#phosphor)">90</text>

    <!-- Divider -->
    <line x1="30" y1="181" x2="530" y2="181" stroke="#00ff41" stroke-width="0.3" opacity="0.2"/>

    <!-- Focus -->
    <text x="30"  y="198" font-size="10" fill="#00ff41" opacity="0.35" letter-spacing="1">FOCUS</text>
    <text x="90"  y="198" font-size="10" fill="#00ff41" filter="url(#phosphor)" opacity="0.6">LLM Orchestration</text>
    <text x="255" y="198" font-size="10" fill="#00ff41" filter="url(#phosphor)" opacity="0.6">Payment Systems</text>
    <text x="390" y="198" font-size="10" fill="#00ff41" filter="url(#phosphor)" opacity="0.6">System Architecture</text>

    <!-- Tools -->
    <text x="30"  y="216" font-size="10" fill="#00ff41" opacity="0.35" letter-spacing="1">TOOLS</text>
    <text x="90"  y="216" font-size="10" fill="#00ff41" filter="url(#phosphor)" opacity="0.6">AI Agents</text>
    <text x="195" y="216" font-size="10" fill="#00ff41" filter="url(#phosphor)" opacity="0.6">RAG Pipelines</text>
    <text x="315" y="216" font-size="10" fill="#00ff41" filter="url(#phosphor)" opacity="0.6">Distributed Systems</text>

    <!-- Footer -->
    <line x1="30" y1="226" x2="530" y2="226" stroke="#00ff41" stroke-width="0.3" opacity="0.15"/>
    <text x="280" y="235" text-anchor="middle" font-size="8" fill="#00ff41" opacity="0.12" letter-spacing="2">REUZ // 2026</text>

  </g>
</svg>
