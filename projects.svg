<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 492" width="100%">
  <defs>
    <filter id="phosphor">
      <feGaussianBlur stdDeviation="1" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <radialGradient id="vignette" cx="50%" cy="50%" r="70%">
      <stop offset="0%" style="stop-color:#0a1a0a; stop-opacity:0"/>
      <stop offset="100%" style="stop-color:#000000; stop-opacity:0.5"/>
    </radialGradient>
    <pattern id="scan" patternUnits="userSpaceOnUse" width="560" height="3">
      <rect width="560" height="1.5" fill="transparent"/>
      <rect y="1.5" width="560" height="1.5" fill="rgba(0,0,0,0.12)"/>
    </pattern>
  </defs>

  <style>
    text { font-family: 'Courier New', 'Consolas', monospace; }
    @keyframes flicker {
      0%, 100% { opacity: 0.97; }
      93% { opacity: 0.90; }
      94% { opacity: 0.97; }
    }
    @keyframes da { 0%, 100% { opacity: 0.9; } 50% { opacity: 1;   } }
    @keyframes db { 0%, 100% { opacity: 0.4; } 50% { opacity: 0.8; } }
    @keyframes ri  { from { opacity: 0; } to { opacity: 1; } }
    .screen { animation: flicker 5s infinite; }
    .da { animation: da 1.2s ease-in-out infinite; }
    .db { animation: db 1.8s ease-in-out infinite; }
    .r1  { animation: ri .4s ease-out .05s  both; }
    .r2  { animation: ri .4s ease-out .15s  both; }
    .r3  { animation: ri .4s ease-out .25s  both; }
    .r4  { animation: ri .4s ease-out .35s  both; }
    .r5  { animation: ri .4s ease-out .50s  both; }
    .r6  { animation: ri .4s ease-out .60s  both; }
    .r7  { animation: ri .4s ease-out .70s  both; }
    .r8  { animation: ri .4s ease-out .80s  both; }
    .r9  { animation: ri .4s ease-out .90s  both; }
    .r10 { animation: ri .4s ease-out 1.00s both; }
    .r11 { animation: ri .4s ease-out 1.10s both; }
    .r12 { animation: ri .4s ease-out 1.20s both; }
    .r13 { animation: ri .4s ease-out 1.30s both; }
    .r14 { animation: ri .4s ease-out 1.40s both; }
    .r15 { animation: ri .4s ease-out 1.50s both; }
  </style>

  <!-- Frame -->
  <rect width="560" height="492" rx="12" fill="#1a1a0e"/>
  <rect x="3" y="3" width="554" height="486" rx="10" fill="#0d0d06" stroke="#2a2a1a" stroke-width="2"/>
  <circle cx="14"  cy="14" r="3" fill="none" stroke="#3a3a2a" stroke-width="1"/>
  <circle cx="546" cy="14" r="3" fill="none" stroke="#3a3a2a" stroke-width="1"/>
  <rect x="8" y="8" width="544" height="476" rx="8" fill="#0a1a0a"/>

