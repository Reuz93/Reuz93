      .r8  { animation: ri .35s ease-out .85s  both; }
      .r9  { animation: ri .35s ease-out .95s  both; }
      .r10 { animation: ri .35s ease-out 1.05s both; }
      .r11 { animation: ri .35s ease-out 1.15s both; }
      .r12 { animation: ri .35s ease-out 1.25s both; }
      .r13 { animation: ri .35s ease-out 1.35s both; }
