<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 380">
  <defs>
    <filter id="phosphor">
      <feGaussianBlur stdDeviation="1" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="phosphor-strong">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <radialGradient id="vignette" cx="50%" cy="50%" r="70%">
      <stop offset="0%" style="stop-color:#0a1a0a; stop-opacity:0"/>
      <stop offset="100%" style="stop-color:#000000; stop-opacity:0.5"/>
    </radialGradient>
    <pattern id="scan" patternUnits="userSpaceOnUse" width="800" height="3">
      <rect width="800" height="1.5" fill="transparent"/>
      <rect y="1.5" width="800" height="1.5" fill="rgba(0,0,0,0.12)"/>
    </pattern>
  </defs>

  <style>
    text { font-family: 'Courier New', 'Consolas', monospace; }
    @keyframes flicker {
      0%, 100% { opacity: 0.97; }
      93% { opacity: 0.90; }
      94% { opacity: 0.97; }
    }
    @keyframes radio-pulse {
      0%, 100% { opacity: 0.8; r: 3; }
      50% { opacity: 0.4; r: 4; }
    }
    @keyframes radio-slow {
      0%, 100% { opacity: 0.5; r: 3; }
      50% { opacity: 0.25; r: 3.5; }
    }
    @keyframes radio-dim {
      0%, 100% { opacity: 0.3; }
      50% { opacity: 0.15; }
    }
    .screen { animation: flicker 5s infinite; }
    .sig-strong { animation: radio-pulse 1.5s ease-in-out infinite; }
    .sig-mid { animation: radio-slow 2.5s ease-in-out infinite; }
    .sig-weak { animation: radio-dim 3s ease-in-out infinite; }
    .sig-dead { opacity: 0.1; }
  </style>

  <!-- Casing -->
  <rect width="800" height="380" rx="12" fill="#1a1a0e"/>
  <rect x="3" y="3" width="794" height="374" rx="10" fill="#0d0d06" stroke="#2a2a1a" stroke-width="2"/>
  <circle cx="14" cy="14" r="3" fill="none" stroke="#3a3a2a" stroke-width="1"/>
  <circle cx="786" cy="14" r="3" fill="none" stroke="#3a3a2a" stroke-width="1"/>
  <circle cx="14" cy="366" r="3" fill="none" stroke="#3a3a2a" stroke-width="1"/>
  <circle cx="786" cy="366" r="3" fill="none" stroke="#3a3a2a" stroke-width="1"/>

  <rect x="8" y="8" width="784" height="364" rx="8" fill="#0a1a0a"/>

  <g class="screen">
    <!-- Tabs -->
    <rect x="20" y="12" width="100" height="18" rx="3" fill="none" stroke="#00ff41" stroke-width="0.5" opacity="0.3"/>
    <text x="70" y="25" text-anchor="middle" font-size="10" fill="#00ff41" opacity="0.4" letter-spacing="2">STAT</text>

    <rect x="130" y="12" width="100" height="18" rx="3" fill="none" stroke="#00ff41" stroke-width="0.5" opacity="0.3"/>
    <text x="180" y="25" text-anchor="middle" font-size="10" fill="#00ff41" opacity="0.4" letter-spacing="2">INV</text>

    <rect x="240" y="12" width="100" height="18" rx="3" fill="#00ff41" opacity="0.15"/>
    <text x="290" y="25" text-anchor="middle" font-size="10" fill="#00ff41" filter="url(#phosphor)" letter-spacing="2" font-weight="bold">DATA</text>

    <rect x="350" y="12" width="100" height="18" rx="3" fill="none" stroke="#00ff41" stroke-width="0.5" opacity="0.3"/>
    <text x="400" y="25" text-anchor="middle" font-size="10" fill="#00ff41" opacity="0.4" letter-spacing="2">MAP</text>

    <line x1="20" y1="35" x2="780" y2="35" stroke="#00ff41" stroke-width="0.5" opacity="0.3"/>

    <!-- Title -->
    <text x="400" y="58" text-anchor="middle" font-size="14" fill="#00ff41" filter="url(#phosphor-strong)" letter-spacing="4">RADIO SIGNALS</text>

    <!-- Legend -->
    <circle cx="220" cy="72" r="3" fill="#00ff41" class="sig-strong"/>
    <text x="228" y="76" font-size="8" fill="#00ff41" opacity="0.5" letter-spacing="1">ACTIVE &lt;7d</text>
    <circle cx="340" cy="72" r="3" fill="#00ff41" class="sig-mid"/>
    <text x="348" y="76" font-size="8" fill="#00ff41" opacity="0.4" letter-spacing="1">STANDBY 7-30d</text>
    <circle cx="480" cy="72" r="3" fill="#00ff41" class="sig-weak"/>
    <text x="488" y="76" font-size="8" fill="#00ff41" opacity="0.3" letter-spacing="1">IDLE 30-90d</text>
    <circle cx="600" cy="72" r="3" fill="#00ff41" class="sig-dead"/>
    <text x="608" y="76" font-size="8" fill="#00ff41" opacity="0.15" letter-spacing="1">LOST 90d+</text>

    <line x1="30" y1="84" x2="770" y2="84" stroke="#00ff41" stroke-width="0.3" opacity="0.2"/>

    <!-- ACTIVE -->
    <text x="30" y="105" font-size="10" fill="#00ff41" opacity="0.3" letter-spacing="2">[ACTIVE SIGNALS]</text>

    <circle cx="44" cy="125" r="3" fill="#00ff41" class="sig-strong"/>
    <text x="55" y="129" font-size="11" fill="#00ff41" filter="url(#phosphor)" letter-spacing="1">TachisBoutique-v2</text>
    <text x="260" y="129" font-size="9" fill="#00ff41" opacity="0.3">............ 1d</text>

    <circle cx="420" cy="125" r="3" fill="#00ff41" class="sig-strong"/>
    <text x="431" y="129" font-size="11" fill="#00ff41" filter="url(#phosphor)" letter-spacing="1">Polybloom</text>
    <text x="580" y="129" font-size="9" fill="#00ff41" opacity="0.3">............ 1d</text>

    <circle cx="44" cy="150" r="3" fill="#00ff41" class="sig-strong"/>
    <text x="55" y="154" font-size="11" fill="#00ff41" filter="url(#phosphor)" letter-spacing="1">InPOS</text>
    <text x="260" y="154" font-size="9" fill="#00ff41" opacity="0.3">............ 2d</text>

    <circle cx="420" cy="150" r="3" fill="#00ff41" class="sig-strong"/>
    <text x="431" y="154" font-size="11" fill="#00ff41" filter="url(#phosphor)" letter-spacing="1">claude-core</text>
    <text x="580" y="154" font-size="9" fill="#00ff41" opacity="0.3">......... today</text>

    <!-- STANDBY -->
    <line x1="30" y1="172" x2="770" y2="172" stroke="#00ff41" stroke-width="0.3" opacity="0.15"/>
    <text x="30" y="192" font-size="10" fill="#00ff41" opacity="0.25" letter-spacing="2">[STANDBY SIGNALS]</text>

    <circle cx="44" cy="212" r="3" fill="#00ff41" class="sig-mid"/>
    <text x="55" y="216" font-size="11" fill="#00ff41" filter="url(#phosphor)" opacity="0.6" letter-spacing="1">PAS_HUB</text>
    <text x="260" y="216" font-size="9" fill="#00ff41" opacity="0.25">........... 15d</text>

    <circle cx="420" cy="212" r="3" fill="#00ff41" class="sig-mid"/>
    <text x="431" y="216" font-size="11" fill="#00ff41" filter="url(#phosphor)" opacity="0.6" letter-spacing="1">claudio</text>
    <text x="580" y="216" font-size="9" fill="#00ff41" opacity="0.25">........... 22d</text>

    <circle cx="44" cy="237" r="3" fill="#00ff41" class="sig-mid"/>
    <text x="55" y="241" font-size="11" fill="#00ff41" filter="url(#phosphor)" opacity="0.6" letter-spacing="1">RefAIn</text>
    <text x="260" y="241" font-size="9" fill="#00ff41" opacity="0.25">........... 25d</text>

    <!-- IDLE -->
    <line x1="30" y1="258" x2="770" y2="258" stroke="#00ff41" stroke-width="0.3" opacity="0.1"/>
    <text x="30" y="278" font-size="10" fill="#00ff41" opacity="0.2" letter-spacing="2">[WEAK SIGNALS]</text>

    <circle cx="44" cy="298" r="3" fill="#00ff41" class="sig-weak"/>
    <text x="55" y="302" font-size="11" fill="#00ff41" opacity="0.35" letter-spacing="1">Sw4rm</text>
    <text x="260" y="302" font-size="9" fill="#00ff41" opacity="0.15">........... 37d</text>

    <circle cx="420" cy="298" r="3" fill="#00ff41" class="sig-weak"/>
    <text x="431" y="302" font-size="11" fill="#00ff41" opacity="0.35" letter-spacing="1">verifone-pos-clone</text>
    <text x="640" y="302" font-size="9" fill="#00ff41" opacity="0.15">... 51d</text>

    <!-- LOST -->
    <line x1="30" y1="318" x2="770" y2="318" stroke="#00ff41" stroke-width="0.3" opacity="0.08"/>
    <text x="30" y="338" font-size="10" fill="#00ff41" opacity="0.12" letter-spacing="2">[LOST SIGNALS]</text>

    <text x="55" y="358" font-size="10" fill="#00ff41" class="sig-dead" letter-spacing="1">TachisBoutique 157d</text>
    <text x="270" y="358" font-size="10" fill="#00ff41" class="sig-dead" letter-spacing="1">Auction_dev 175d</text>
    <text x="500" y="358" font-size="10" fill="#00ff41" class="sig-dead" letter-spacing="1">nextjs-bp 497d</text>

    <!-- Footer -->
    <text x="400" y="373" text-anchor="middle" font-size="8" fill="#00ff41" opacity="0.12" letter-spacing="2">4 ACTIVE // 3 STANDBY // 2 IDLE // 3 LOST // SCAN: 2026-03-28</text>

    <!-- Vignette + Scanlines -->
    <rect x="8" y="8" width="784" height="364" rx="8" fill="url(#vignette)"/>
    <rect x="8" y="8" width="784" height="364" rx="8" fill="url(#scan)"/>
  </g>
</svg>
