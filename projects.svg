      @keyframes da { 0%, 100% { opacity: 0.85; } 50% { opacity: 1; } }
      @keyframes db { 0%, 100% { opacity: 0.40; } 50% { opacity: 0.75; } }
      @keyframes ri  { from { opacity: 0; } to { opacity: 1; } }
      .da  { animation: da  1.4s ease-in-out infinite; }
      .db  { animation: db  2.0s ease-in-out infinite; }
      .r1  { animation: ri .35s ease-out .05s  both; }
      .r2  { animation: ri .35s ease-out .15s  both; }
      .r3  { animation: ri .35s ease-out .25s  both; }
      .r4  { animation: ri .35s ease-out .45s  both; }
      .r5  { animation: ri .35s ease-out .55s  both; }
