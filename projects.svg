<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 200" width="100%">
  <defs>
    <filter id="phosphor">
      <feGaussianBlur stdDeviation="1" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="ph-strong">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <!-- Scroll viewport clip -->
    <clipPath id="proj-viewport">
      <rect x="8" y="62" width="544" height="111"/>
    </clipPath>
    <!-- Bottom fade: suggests more rows below -->
    <linearGradient id="fade-dn" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a1a0a" stop-opacity="0"/>
      <stop offset="100%" stop-color="#0a1a0a" stop-opacity="0.9"/>
    </linearGradient>
    <!-- Top fade: appears when scrolled, suggests rows above -->
    <linearGradient id="fade-up" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a1a0a" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#0a1a0a" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="vignette" cx="50%" cy="50%" r="70%">
      <stop offset="0%" style="stop-color:#0a1a0a; stop-opacity:0"/>
      <stop offset="100%" style="stop-color:#000000; stop-opacity:0.5"/>
    </radialGradient>
    <pattern id="scan" patternUnits="userSpaceOnUse" width="560" height="3">
      <rect width="560" height="1.5" fill="transparent"/>
      <rect y="1.5" width="560" height="1.5" fill="rgba(0,0,0,0.12)"/>
    </pattern>
  </defs>

  <style>
    text { font-family: 'Courier New', 'Consolas', monospace; }
    @keyframes flicker {
      0%, 100% { opacity: 0.97; }
      93% { opacity: 0.90; }
      94% { opacity: 0.97; }
    }
    @keyframes dot-active {
      0%, 100% { opacity: 0.9; }
      50%       { opacity: 1;   }
    }
    @keyframes dot-build {
      0%, 100% { opacity: 0.45; }
      50%      { opacity: 0.8;  }
    }
    .screen { animation: flicker 5s infinite; }
    .da { animation: dot-active 1.2s ease-in-out infinite; }
    .db { animation: dot-build  1.8s ease-in-out infinite; }
  </style>

  <!-- Outer frame -->
  <rect width="560" height="200" rx="12" fill="#1a1a0e"/>
  <rect x="3" y="3" width="554" height="194" rx="10" fill="#0d0d06" stroke="#2a2a1a" stroke-width="2"/>
  <circle cx="14"  cy="14" r="3" fill="none" stroke="#3a3a2a" stroke-width="1"/>
  <circle cx="546" cy="14" r="3" fill="none" stroke="#3a3a2a" stroke-width="1"/>
  <rect x="8" y="8" width="544" height="184" rx="8" fill="#0a1a0a"/>

  <g class="screen">

    <!-- ── Static Header ── -->
    <text x="30" y="34" font-size="12" fill="#00ff41" filter="url(#phosphor)" letter-spacing="3">PROJECTS</text>
    <text x="142" y="34" font-size="9" fill="#00ff41" opacity="0.28" letter-spacing="1">--verbose</text>
    <line x1="30" y1="43" x2="530" y2="43" stroke="#00ff41" stroke-width="0.4" opacity="0.2"/>
    <text x="65"  y="57" font-size="8" fill="#00ff41" opacity="0.25" letter-spacing="1">NAME</text>
    <text x="210" y="57" font-size="8" fill="#00ff41" opacity="0.25" letter-spacing="1">STACK</text>
    <text x="430" y="57" font-size="8" fill="#00ff41" opacity="0.25" letter-spacing="1">STATUS</text>

    <!-- ── Scrolling Rows (clipped to viewport y=62–173) ── -->
    <g clip-path="url(#proj-viewport)">
      <g>
        <!-- Scroll: pause → scroll to row2 → pause → scroll to row3+pvt → pause → return -->
        <animateTransform
          attributeName="transform"
          type="translate"
          values="0,0; 0,0; 0,-37; 0,-37; 0,-74; 0,-74; 0,0; 0,0"
          keyTimes="0; 0.14; 0.24; 0.44; 0.54; 0.74; 0.88; 1"
          calcMode="spline"
          keySplines="0 0 1 1; 0.4 0 0.6 1; 0 0 1 1; 0.4 0 0.6 1; 0 0 1 1; 0.4 0 0.6 1; 0 0 1 1"
          dur="22s"
          repeatCount="indefinite"
        />

        <!-- ── Row 1: InPOS v2 · ACTIVE ── -->
        <circle cx="45" cy="78" r="5" fill="#00ff41" filter="url(#phosphor)" class="da"/>
        <circle cx="45" cy="78" r="2" fill="#0a1a0a"/>
        <text x="62"  y="83" font-size="13" fill="#00ff41" filter="url(#phosphor)" font-weight="bold">InPOS v2</text>
        <text x="210" y="83" font-size="9"  fill="#00ff41" opacity="0.45">POS · Android · FinTech · Rails</text>
        <rect x="425" y="71" width="96" height="16" rx="2" fill="none" stroke="#00ff41" stroke-width="0.6" opacity="0.5"/>
        <text x="473" y="83" text-anchor="middle" font-size="9" fill="#00ff41" filter="url(#phosphor)" opacity="0.85" letter-spacing="1">ACTIVE</text>
        <line x1="30" y1="97" x2="530" y2="97" stroke="#00ff41" stroke-width="0.3" opacity="0.1"/>

        <!-- ── Row 2: Ember Slime · BUILD ── -->
        <circle cx="45" cy="115" r="5" fill="none" stroke="#00ff41" stroke-width="1.5" class="db"/>
        <text x="62"  y="120" font-size="13" fill="#00ff41" filter="url(#phosphor)" font-weight="bold">Ember Slime</text>
        <text x="210" y="120" font-size="9"  fill="#00ff41" opacity="0.40">AI Companion · Tauri · Rust</text>
        <rect x="425" y="108" width="96" height="16" rx="2" fill="none" stroke="#00ff41" stroke-width="0.5" opacity="0.35"/>
        <text x="473" y="120" text-anchor="middle" font-size="9" fill="#00ff41" opacity="0.55" letter-spacing="1">BUILD</text>
        <line x1="30" y1="134" x2="530" y2="134" stroke="#00ff41" stroke-width="0.3" opacity="0.1"/>

        <!-- ── Row 3: MangaJigen · MOD ── -->
        <circle cx="45" cy="152" r="5" fill="none" stroke="#00ff41" stroke-width="1" opacity="0.3"/>
        <text x="62"  y="157" font-size="13" fill="#00ff41" opacity="0.6" font-weight="bold">MangaJigen</text>
        <text x="210" y="157" font-size="9"  fill="#00ff41" opacity="0.28">GBA · ROM Hack · Assembly</text>
        <rect x="425" y="145" width="96" height="16" rx="2" fill="none" stroke="#00ff41" stroke-width="0.5" opacity="0.18"/>
        <text x="473" y="157" text-anchor="middle" font-size="9" fill="#00ff41" opacity="0.28" letter-spacing="1">MOD</text>
        <line x1="30" y1="171" x2="530" y2="171" stroke="#00ff41" stroke-width="0.3" opacity="0.12"/>

        <!-- ── Classified divider ── -->
        <text x="30" y="183" font-size="7" fill="#00ff41" opacity="0.2" letter-spacing="2">CLASSIFIED  ────────────────────────────────────────────</text>

        <!-- ── Row 4: Private A · NDA ── -->
        <circle cx="45" cy="200" r="5" fill="none" stroke="#00ff41" stroke-width="1.2" opacity="0.35" class="db"/>
        <text x="62"  y="205" font-size="13" fill="#00ff41" opacity="0.5" font-weight="bold">████████████</text>
        <text x="210" y="205" font-size="9"  fill="#00ff41" opacity="0.25">Network Sim · Distributed · Python</text>
        <rect x="425" y="193" width="96" height="16" rx="2" fill="none" stroke="#00ff41" stroke-width="0.5" opacity="0.2"/>
        <text x="473" y="205" text-anchor="middle" font-size="9" fill="#00ff41" opacity="0.3" letter-spacing="1">NDA</text>
        <line x1="30" y1="219" x2="530" y2="219" stroke="#00ff41" stroke-width="0.3" opacity="0.08"/>

        <!-- ── Row 5: Private B · NDA ── -->
        <circle cx="45" cy="237" r="5" fill="none" stroke="#00ff41" stroke-width="1" opacity="0.22"/>
        <text x="62"  y="242" font-size="13" fill="#00ff41" opacity="0.4" font-weight="bold">██████████</text>
        <text x="210" y="242" font-size="9"  fill="#00ff41" opacity="0.2">AI Integration · API · Internal</text>
        <rect x="425" y="230" width="96" height="16" rx="2" fill="none" stroke="#00ff41" stroke-width="0.5" opacity="0.14"/>
        <text x="473" y="242" text-anchor="middle" font-size="9" fill="#00ff41" opacity="0.22" letter-spacing="1">NDA</text>

      </g>
    </g>

    <!-- ── Gradient fades (outside clip — always visible) ── -->
    <rect x="8"  y="150" width="544" height="23" fill="url(#fade-dn)"/>
    <rect x="8"  y="62"  width="544" height="14" fill="url(#fade-up)"/>

    <!-- ── Footer ── -->
    <line x1="30" y1="178" x2="530" y2="178" stroke="#00ff41" stroke-width="0.3" opacity="0.12"/>
    <text x="280" y="190" text-anchor="middle" font-size="7" fill="#00ff41" opacity="0.1" letter-spacing="2">SCAN: 2026-04-06</text>

    <rect x="8" y="8" width="544" height="184" rx="8" fill="url(#vignette)"/>
    <rect x="8" y="8" width="544" height="184" rx="8" fill="url(#scan)"/>
  </g>
</svg>
