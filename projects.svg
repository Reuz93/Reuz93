<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 140" width="100%">
  <defs>
    <filter id="phosphor">
      <feGaussianBlur stdDeviation="1" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="ph-strong">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <radialGradient id="vignette" cx="50%" cy="50%" r="70%">
      <stop offset="0%" style="stop-color:#0a1a0a; stop-opacity:0"/>
      <stop offset="100%" style="stop-color:#000000; stop-opacity:0.5"/>
    </radialGradient>
    <pattern id="scan" patternUnits="userSpaceOnUse" width="560" height="3">
      <rect width="560" height="1.5" fill="transparent"/>
      <rect y="1.5" width="560" height="1.5" fill="rgba(0,0,0,0.12)"/>
    </pattern>
  </defs>

  <style>
    text { font-family: 'Courier New', 'Consolas', monospace; }
    @keyframes flicker {
      0%, 100% { opacity: 0.97; }
      93% { opacity: 0.90; }
      94% { opacity: 0.97; }
    }
    @keyframes pulse {
      0%, 100% { opacity: 0.7; }
      50% { opacity: 1; }
    }
    @keyframes pulse-slow {
      0%, 100% { opacity: 0.4; }
      50% { opacity: 0.6; }
    }
    @keyframes pulse-dim {
      0%, 100% { opacity: 0.2; }
      50% { opacity: 0.35; }
    }
    .screen { animation: flicker 5s infinite; }
    .p-active { animation: pulse 1.5s ease-in-out infinite; }
    .p-standby { animation: pulse-slow 2.5s ease-in-out infinite; }
    .p-idle { animation: pulse-dim 3s ease-in-out infinite; }
  </style>

  <rect width="560" height="140" rx="12" fill="#1a1a0e"/>
  <rect x="3" y="3" width="554" height="134" rx="10" fill="#0d0d06" stroke="#2a2a1a" stroke-width="2"/>

  <rect x="8" y="8" width="544" height="124" rx="8" fill="#0a1a0a"/>

  <g class="screen">
    <text x="280" y="30" text-anchor="middle" font-size="12" fill="#00ff41" filter="url(#phosphor)" letter-spacing="3">REPOSITORIES</text>
    <line x1="30" y1="40" x2="530" y2="40" stroke="#00ff41" stroke-width="0.3" opacity="0.2"/>

    <!-- Active -->
    <circle cx="70" cy="68" r="6" fill="#00ff41" class="p-active" filter="url(#phosphor)"/>
    <text x="70" y="72" text-anchor="middle" font-size="11" fill="#0a1a0a" font-weight="bold">4</text>
    <text x="70" y="90" text-anchor="middle" font-size="9" fill="#00ff41" opacity="0.5" letter-spacing="1">ACTIVE</text>
    <text x="70" y="102" text-anchor="middle" font-size="7" fill="#00ff41" opacity="0.25">&lt;7 days</text>

    <!-- Standby -->
    <circle cx="190" cy="68" r="6" fill="#00ff41" class="p-standby" filter="url(#phosphor)"/>
    <text x="190" y="72" text-anchor="middle" font-size="11" fill="#0a1a0a" font-weight="bold">3</text>
    <text x="190" y="90" text-anchor="middle" font-size="9" fill="#00ff41" opacity="0.4" letter-spacing="1">STANDBY</text>
    <text x="190" y="102" text-anchor="middle" font-size="7" fill="#00ff41" opacity="0.2">7-30 days</text>

    <!-- Idle -->
    <circle cx="310" cy="68" r="6" fill="#00ff41" class="p-idle" filter="url(#phosphor)"/>
    <text x="310" y="72" text-anchor="middle" font-size="11" fill="#0a1a0a" font-weight="bold">2</text>
    <text x="310" y="90" text-anchor="middle" font-size="9" fill="#00ff41" opacity="0.3" letter-spacing="1">IDLE</text>
    <text x="310" y="102" text-anchor="middle" font-size="7" fill="#00ff41" opacity="0.15">30-90 days</text>

    <!-- Lost -->
    <circle cx="430" cy="68" r="6" fill="#00ff41" opacity="0.1"/>
    <text x="430" y="72" text-anchor="middle" font-size="11" fill="#0a1a0a" font-weight="bold" opacity="0.5">3</text>
    <text x="430" y="90" text-anchor="middle" font-size="9" fill="#00ff41" opacity="0.15" letter-spacing="1">ARCHIVED</text>
    <text x="430" y="102" text-anchor="middle" font-size="7" fill="#00ff41" opacity="0.1">90+ days</text>

    <!-- Total -->
    <line x1="480" y1="52" x2="480" y2="105" stroke="#00ff41" stroke-width="0.3" opacity="0.15"/>
    <text x="515" y="65" text-anchor="middle" font-size="9" fill="#00ff41" opacity="0.3" letter-spacing="1">TOTAL</text>
    <text x="515" y="90" text-anchor="middle" font-size="24" fill="#00ff41" filter="url(#ph-strong)" font-weight="bold" opacity="0.7">12</text>

    <!-- Footer -->
    <text x="280" y="125" text-anchor="middle" font-size="7" fill="#00ff41" opacity="0.1" letter-spacing="2">SCAN: 2026-03-28</text>

    <rect x="8" y="8" width="544" height="124" rx="8" fill="url(#vignette)"/>
    <rect x="8" y="8" width="544" height="124" rx="8" fill="url(#scan)"/>
  </g>
</svg>
