<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 120">
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="title-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff6600"/>
      <stop offset="30%" style="stop-color:#ffcc00"/>
      <stop offset="60%" style="stop-color:#72f862"/>
      <stop offset="100%" style="stop-color:#00ccff"/>
    </linearGradient>
  </defs>

  <style>
    text { font-family: 'Courier New', 'Consolas', monospace; }

    @keyframes flicker {
      0%, 100% { opacity: 1; }
      93% { opacity: 0.85; }
      94% { opacity: 1; }
      96% { opacity: 0.9; }
    }
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0; }
    }
    @keyframes marquee {
      0% { transform: translateX(800px); }
      100% { transform: translateX(-900px); }
    }
    .screen { animation: flicker 6s infinite; }
    .blink { animation: blink 1.2s step-end infinite; }
    .scroll { animation: marquee 20s linear infinite; }

    @keyframes scanmove {
      0% { transform: translateY(-120px); }
      100% { transform: translateY(120px); }
    }
    .scanbar { animation: scanmove 4s linear infinite; opacity: 0.06; }
  </style>

  <rect width="800" height="120" rx="8" fill="#0a0a1e"/>
  <rect x="2" y="2" width="796" height="116" rx="7" fill="#050510" stroke="#2a2a4a" stroke-width="1"/>

  <g class="screen">
    <!-- Title -->
    <text x="400" y="48" text-anchor="middle" font-size="36" font-weight="bold" fill="url(#title-grad)" filter="url(#glow)" letter-spacing="6">
      ROB ECHEAGARAY
    </text>

    <!-- Subtitle -->
    <text x="400" y="72" text-anchor="middle" font-size="14" fill="#ff6600" filter="url(#glow)" letter-spacing="3">
      SYSTEM ARCHITECT  //  MECHATRONICS  //  AI BUILDER
    </text>

    <!-- Scrolling text -->
    <g clip-path="url(#ticker-clip)">
      <text y="100" font-size="11" fill="#333355" class="scroll" letter-spacing="1">
        MONTERREY MX --- FINTECH --- POS SYSTEMS --- AI AGENTS --- DISTRIBUTED COMPUTING --- CLAUDE CODE --- KOTLIN --- TYPESCRIPT --- RUBY ON RAILS ---
      </text>
    </g>
    <clipPath id="ticker-clip">
      <rect x="10" y="85" width="780" height="25"/>
    </clipPath>

    <!-- Corner decorations -->
    <text x="15" y="18" font-size="9" fill="#333355">P1</text>
    <text x="760" y="18" font-size="9" fill="#333355" class="blink">REC</text>

    <!-- Scan bar -->
    <rect class="scanbar" x="0" y="0" width="800" height="8" fill="#ffffff"/>
  </g>
</svg>
