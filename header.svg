<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 140" width="100%">
  <defs>
    <linearGradient id="card-bg" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#161b22"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#58a6ff"/>
      <stop offset="100%" stop-color="#3fb950"/>
    </linearGradient>
    <style>
      .sans { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; }
      .mono { font-family: 'Segoe UI Mono', 'Cascadia Code', 'Courier New', monospace; }
    </style>
  </defs>

  <!-- Card -->
  <rect width="800" height="140" rx="6" fill="url(#card-bg)"/>
  <rect x="0.5" y="0.5" width="799" height="139" rx="5.5" fill="none" stroke="#30363d" stroke-width="1"/>

  <!-- Left accent bar -->
  <rect x="0" y="0" width="3" height="140" rx="2" fill="url(#accent)"/>

  <!-- Name -->
  <text x="22" y="44" class="sans" font-size="22" font-weight="700" fill="#e6edf3">Roberto Echeagaray</text>

  <!-- Role -->
  <text x="22" y="66" class="sans" font-size="13" fill="#8b949e">Software Engineer</text>

  <!-- Location dot + text -->
  <circle cx="22" cy="85" r="3" fill="#3fb950" opacity="0.8"/>
  <text x="31" y="89" class="sans" font-size="12" fill="#6e7681">Monterrey, MX</text>

  <!-- Separator -->
  <line x1="22" y1="104" x2="460" y2="104" stroke="#21262d" stroke-width="1"/>

  <!-- Focus tags -->
  <text x="22"  y="120" class="sans" font-size="11" fill="#58a6ff">AI Systems</text>
  <text x="98"  y="120" class="sans" font-size="11" fill="#30363d">·</text>
  <text x="107" y="120" class="sans" font-size="11" fill="#58a6ff">FinTech</text>
  <text x="157" y="120" class="sans" font-size="11" fill="#30363d">·</text>
  <text x="166" y="120" class="sans" font-size="11" fill="#58a6ff">System Architecture</text>
  <text x="300" y="120" class="sans" font-size="11" fill="#30363d">·</text>
  <text x="309" y="120" class="sans" font-size="11" fill="#58a6ff">Mechatronics</text>
  <text x="406" y="120" class="sans" font-size="11" fill="#30363d">·</text>
  <text x="415" y="120" class="sans" font-size="11" fill="#58a6ff">Payment Systems</text>

  <!-- Code snippet (right side, syntax-highlighted) -->
  <text x="510" y="36" class="mono" font-size="11.5" fill="#ff7b72">const</text>
  <text x="549" y="36" class="mono" font-size="11.5" fill="#e6edf3"> builder</text>
  <text x="619" y="36" class="mono" font-size="11.5" fill="#ff7b72"> =</text>
  <text x="630" y="36" class="mono" font-size="11.5" fill="#e6edf3"> {</text>

  <text x="522" y="53" class="mono" font-size="11.5" fill="#79c0ff">ai</text>
  <text x="537" y="53" class="mono" font-size="11.5" fill="#e6edf3">:</text>
  <text x="544" y="53" class="mono" font-size="11.5" fill="#79c0ff"> 95</text>
  <text x="565" y="53" class="mono" font-size="11.5" fill="#e6edf3">,</text>
  <text x="580" y="53" class="mono" font-size="11.5" fill="#79c0ff">fullStack</text>
  <text x="643" y="53" class="mono" font-size="11.5" fill="#e6edf3">:</text>
  <text x="650" y="53" class="mono" font-size="11.5" fill="#79c0ff"> 98</text>
  <text x="671" y="53" class="mono" font-size="11.5" fill="#e6edf3">,</text>

  <text x="522" y="70" class="mono" font-size="11.5" fill="#79c0ff">fintech</text>
  <text x="572" y="70" class="mono" font-size="11.5" fill="#e6edf3">:</text>
  <text x="580" y="70" class="mono" font-size="11.5" fill="#79c0ff"> 80</text>
  <text x="600" y="70" class="mono" font-size="11.5" fill="#e6edf3">,</text>
  <text x="617" y="70" class="mono" font-size="11.5" fill="#79c0ff">mechatronics</text>
  <text x="712" y="70" class="mono" font-size="11.5" fill="#e6edf3">:</text>
  <text x="720" y="70" class="mono" font-size="11.5" fill="#79c0ff"> 90</text>
  <text x="741" y="70" class="mono" font-size="11.5" fill="#e6edf3">,</text>

  <text x="522" y="87" class="mono" font-size="11.5" fill="#d2a8ff">building</text>
  <text x="581" y="87" class="mono" font-size="11.5" fill="#e6edf3">:</text>
  <text x="588" y="87" class="mono" font-size="11.5" fill="#79c0ff"> true</text>
  <text x="617" y="87" class="mono" font-size="11.5" fill="#e6edf3">,</text>
  <text x="627" y="87" class="mono" font-size="11.5" fill="#8b949e">  // always</text>

  <text x="510" y="104" class="mono" font-size="11.5" fill="#e6edf3">}</text>
</svg>
