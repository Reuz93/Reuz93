<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 160">
  <defs>
    <filter id="phosphor">
      <feGaussianBlur stdDeviation="1.2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="phosphor-strong">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="crt-warp">
      <feGaussianBlur stdDeviation="0.3"/>
    </filter>
    <radialGradient id="screen-vignette" cx="50%" cy="50%" r="70%">
      <stop offset="0%" style="stop-color:#0a1a0a; stop-opacity:0"/>
      <stop offset="100%" style="stop-color:#000000; stop-opacity:0.6"/>
    </radialGradient>
    <pattern id="scanlines" patternUnits="userSpaceOnUse" width="800" height="3">
      <rect width="800" height="1.5" fill="transparent"/>
      <rect y="1.5" width="800" height="1.5" fill="rgba(0,0,0,0.15)"/>
    </pattern>
  </defs>

  <style>
    text { font-family: 'Courier New', 'Consolas', monospace; }
    @keyframes flicker {
      0%, 100% { opacity: 0.97; }
      50% { opacity: 1; }
      92% { opacity: 0.98; }
      93% { opacity: 0.90; }
      94% { opacity: 0.98; }
    }
    @keyframes cursor-blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0; }
    }
    @keyframes scroll-ticker {
      0% { transform: translateX(820px); }
      100% { transform: translateX(-1100px); }
    }
    @keyframes scanbar {
      0% { transform: translateY(-10px); }
      100% { transform: translateY(170px); }
    }
    .screen { animation: flicker 4s infinite; }
    .cursor { animation: cursor-blink 1s step-end infinite; }
    .ticker { animation: scroll-ticker 25s linear infinite; }
    .scanbar { animation: scanbar 8s linear infinite; opacity: 0.03; }
  </style>

  <!-- Pip-Boy outer casing -->
  <rect width="800" height="160" rx="12" fill="#1a1a0e"/>
  <rect x="3" y="3" width="794" height="154" rx="10" fill="#0d0d06" stroke="#2a2a1a" stroke-width="2"/>
  <!-- Screen bezel screws -->
  <circle cx="14" cy="14" r="3" fill="none" stroke="#3a3a2a" stroke-width="1"/>
  <circle cx="786" cy="14" r="3" fill="none" stroke="#3a3a2a" stroke-width="1"/>
  <circle cx="14" cy="146" r="3" fill="none" stroke="#3a3a2a" stroke-width="1"/>
  <circle cx="786" cy="146" r="3" fill="none" stroke="#3a3a2a" stroke-width="1"/>

  <!-- CRT Screen -->
  <rect x="8" y="8" width="784" height="144" rx="8" fill="#0a1a0a"/>

  <g class="screen">
    <!-- Pip-Boy tabs -->
    <rect x="20" y="12" width="80" height="18" rx="3" fill="#00ff41" opacity="0.15"/>
    <text x="60" y="25" text-anchor="middle" font-size="10" fill="#00ff41" filter="url(#phosphor)" letter-spacing="2" font-weight="bold">STAT</text>

    <rect x="110" y="12" width="80" height="18" rx="3" fill="none" stroke="#00ff41" stroke-width="0.5" opacity="0.3"/>
    <text x="150" y="25" text-anchor="middle" font-size="10" fill="#00ff41" opacity="0.4" letter-spacing="2">INV</text>

    <rect x="200" y="12" width="80" height="18" rx="3" fill="none" stroke="#00ff41" stroke-width="0.5" opacity="0.3"/>
    <text x="240" y="25" text-anchor="middle" font-size="10" fill="#00ff41" opacity="0.4" letter-spacing="2">DATA</text>

    <rect x="290" y="12" width="80" height="18" rx="3" fill="none" stroke="#00ff41" stroke-width="0.5" opacity="0.3"/>
    <text x="330" y="25" text-anchor="middle" font-size="10" fill="#00ff41" opacity="0.4" letter-spacing="2">MAP</text>

    <!-- Separator -->
    <line x1="20" y1="35" x2="780" y2="35" stroke="#00ff41" stroke-width="0.5" opacity="0.3"/>

    <!-- Main title -->
    <text x="400" y="70" text-anchor="middle" font-size="40" font-weight="bold" fill="#00ff41" filter="url(#phosphor-strong)" letter-spacing="10">REUZ</text>

    <!-- Subtitle line -->
    <text x="400" y="92" text-anchor="middle" font-size="11" fill="#00ff41" filter="url(#phosphor)" letter-spacing="3" opacity="0.7">SYSTEM ARCHITECT  /  FINTECH  /  AI BUILDER</text>

    <!-- Location + version -->
    <text x="30" y="108" font-size="9" fill="#00ff41" opacity="0.4" letter-spacing="1">LOC: MONTERREY, NL, MX</text>
    <text x="780" y="108" text-anchor="end" font-size="9" fill="#00ff41" opacity="0.4" letter-spacing="1">PIP-OS v4.2.0</text>

    <!-- Ticker -->
    <line x1="20" y1="116" x2="780" y2="116" stroke="#00ff41" stroke-width="0.3" opacity="0.2"/>
    <g clip-path="url(#t-clip)">
      <text y="130" font-size="9" fill="#00ff41" opacity="0.25" class="ticker" letter-spacing="2">
        KOTLIN // TYPESCRIPT // PYTHON // RUBY // RAILS // CLAUDE CODE // VERIFONE POS // ANDROID // POSTGRESQL // NODE.JS // DISTRIBUTED AGENTS // GEMINI //
      </text>
    </g>
    <clipPath id="t-clip">
      <rect x="20" y="118" width="760" height="20"/>
    </clipPath>

    <!-- Cursor -->
    <rect x="30" y="140" width="8" height="2" fill="#00ff41" opacity="0.5" class="cursor"/>

    <!-- Footer line -->
    <text x="780" y="148" text-anchor="end" font-size="7" fill="#00ff41" opacity="0.2" letter-spacing="2">github.com/Reuz93</text>

    <!-- Scan bar -->
    <rect class="scanbar" x="8" y="0" width="784" height="3" fill="#00ff41"/>

    <!-- Vignette -->
    <rect x="8" y="8" width="784" height="144" rx="8" fill="url(#screen-vignette)"/>
    <!-- Scanlines -->
    <rect x="8" y="8" width="784" height="144" rx="8" fill="url(#scanlines)"/>
  </g>
</svg>
